name: Automod

on:
  issue_comment:
    types: [created, edited]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  comment-filter:
    name: Comment filter
    runs-on: ubuntu-slim
    permissions:
      issues: write # delete spam
    steps:
    - name: Comment filter
      uses: DecimalTurn/Comment-Filter@9c95bdb06ae1dd6b8185d58f52a07a2a71e19d94 # v0.2.2
      with:
        exclude-contributors: true
