name: RPM GPG key check

permissions: {}

on:
  pull_request:
    paths:
      - '**.repo'
      - '**/rpm-gpg/*'
      - 'files/scripts/**'
      - 'tools/**'
  schedule:
    - cron: "00 3 * * *" # run at 3:00 UTC every day
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  rpm-gpg:
    name: Check RPM repo consistency
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Check RPM repo keys
        run: tools/check_repo_keys.py
