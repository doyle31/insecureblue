name: pr-build-zfs

permissions: {}

on:
  pull_request:
    branches:
      - live
      - staging
      - next
    paths:
      - '**zfs**'
      - '!**.md'
      - '!.github/**'
      - '.github/workflows/pr_build.yml'

# Cancels running workflows if a new workflow run for
# the same workflow is started
concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  bluebuild:
    name: PR build
    permissions:
      contents: read # Needed to pull the repo for the build
      packages: read # Needed to read base image manifests
    strategy:
      fail-fast: false
      matrix:
        recipe:
          - securecore/recipe-securecore-zfs-main.yml
          - iot/recipe-iot-zfs-main.yml
    uses: ./.github/workflows/pr_build.yml
    with:
      recipe: ${{ matrix.recipe }}
