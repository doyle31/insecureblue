# Fix bug where /var/lib/libvirt and /var/log/libvirt are created with
# wrong SELinux file contexts, causing permission errors.

d /var/lib/libvirt 0755
Z /var/lib/libvirt

d /var/log/libvirt 0700
Z /var/log/libvirt
