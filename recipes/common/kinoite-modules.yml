modules:
  - type: dnf
    source: ghcr.io/blue-build/modules@sha256:8e92fcaaef385a1728b8d8224296484260b67126ac83f7ed85b4ae3dde4ad19d
    remove:
      packages:
        - kde-connect
        - kde-connect-libs
        - kdeconnectd
        - fedora-chromium-config-kde
        - fedora-flathub-remote
        # depends on fedora-flathub-remote
        - plasma-welcome-fedora
        - fuse-encfs
        - krfb
        - krfb-libs
        - plasma-browser-integration
        - plasma-discover
        - fedora-workstation-repositories
        - fedora-third-party
  - type: dnf
    source: ghcr.io/blue-build/modules@sha256:8e92fcaaef385a1728b8d8224296484260b67126ac83f7ed85b4ae3dde4ad19d
    install:
      install-weak-deps: false
      packages:
        - krunner-bazaar
  - type: files
    source: ghcr.io/blue-build/modules@sha256:8e92fcaaef385a1728b8d8224296484260b67126ac83f7ed85b4ae3dde4ad19d
    files:
      - source: system/kinoite
        destination: /
  - type: justfiles
    source: ghcr.io/blue-build/modules@sha256:8e92fcaaef385a1728b8d8224296484260b67126ac83f7ed85b4ae3dde4ad19d
    validate: true
    include:
      - kinoite.just
  - type: script
    source: ghcr.io/blue-build/modules@sha256:8e92fcaaef385a1728b8d8224296484260b67126ac83f7ed85b4ae3dde4ad19d
    scripts:
      - setdefaultkdewallpapers.sh
      - systemsettings-standard-malloc.sh
      - removekrunnerappstream.sh
