modules:
  - type: files
    source: ghcr.io/blue-build/modules@sha256:079ae754f5b57e8f2ca5850b33a633b3fe1c37f4be51e7b00e9250a997f4e334
    files:
      - source: system/nvidia
        destination: /

  - type: justfiles
    source: ghcr.io/blue-build/modules@sha256:079ae754f5b57e8f2ca5850b33a633b3fe1c37f4be51e7b00e9250a997f4e334
    validate: true
    include:
      - nvidia

  - type: script
    source: ghcr.io/blue-build/modules@sha256:079ae754f5b57e8f2ca5850b33a633b3fe1c37f4be51e7b00e9250a997f4e334
    scripts:
      - installnvidiakmod.sh
    secrets:
      - type: env
        name: KERNEL_PRIVKEY
        mount:
          type: file
          destination: /tmp/certs/private_key.priv

  - type: script
    source: ghcr.io/blue-build/modules@sha256:079ae754f5b57e8f2ca5850b33a633b3fe1c37f4be51e7b00e9250a997f4e334
    scripts:
      - installnvidiapackages.sh
      - remove-nvidia-repos.sh
      - setearlyloading.sh
      - setdrmvariables.sh
