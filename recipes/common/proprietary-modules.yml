modules:
    - type: dnf
      source: ghcr.io/blue-build/modules@sha256:bfc7637d823742eaabc7c01bbd3def9de1eeff28e9891916e501f54644ff1d7a
      install:
        install-weak-deps: false
        packages:
          - libopenjph
          - heif-pixbuf-loader
          - ffmpegthumbnailer
          - pipewire-libs-extra

    - type: dnf
      source: ghcr.io/blue-build/modules@sha256:bfc7637d823742eaabc7c01bbd3def9de1eeff28e9891916e501f54644ff1d7a
      replace:
        - from-repo: fedora-multimedia
          skip-unavailable: true
          packages:
            - libheif
            - libva
            - mesa-dri-drivers
            - gstreamer1-plugin-libav
            - mesa-filesystem
            - mesa-libEGL
            - mesa-libGL
            - mesa-libgbm
            - mesa-va-drivers
            - mesa-vulkan-drivers
            - libva-intel-media-driver
            - intel-gmmlib
            - intel-mediasdk

    - type: dnf
      source: ghcr.io/blue-build/modules@sha256:bfc7637d823742eaabc7c01bbd3def9de1eeff28e9891916e501f54644ff1d7a
      replace:
        - from-repo: fedora-multimedia
          skip-unavailable: true
          packages:
            - old: ffmpeg-free
              new: ffmpeg
            - old: fdk-aac-free
              new: libfdk-aac
            - old: gstreamer1-plugins-ugly-free
              new: gstreamer1-plugins-ugly
            - old: libavcodec-free
              new: libavcodec
            - old: libavdevice-free
              new: libavdevice
            - old: libavfilter-free
              new: libavfilter
            - old: libavformat-free
              new: libavformat
            - old: libavutil-free
              new: libavutil
            - old: libpostproc-free
              new: libpostproc
            - old: libswresample-free
              new: libswresample
            - old: libswscale-free
              new: libswscale

    - type: script
      source: ghcr.io/blue-build/modules@sha256:bfc7637d823742eaabc7c01bbd3def9de1eeff28e9891916e501f54644ff1d7a
      scripts:
        - removeunusedrepos.sh
