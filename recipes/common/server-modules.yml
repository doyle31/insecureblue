modules:
  - type: dnf
    source: ghcr.io/blue-build/modules@sha256:23b9c9a2032ac653bf6a73a3b9372c12004211e004eea4269a8d3da9001c2301
    install:
      install-weak-deps: false
      packages:
        - setools-console
        - usbguard
        - firewalld
        - policycoreutils-python-utils

  - type: files
    source: ghcr.io/blue-build/modules@sha256:23b9c9a2032ac653bf6a73a3b9372c12004211e004eea4269a8d3da9001c2301
    files:
      - source: system/server
        destination: /

  - type: script
    source: ghcr.io/blue-build/modules@sha256:23b9c9a2032ac653bf6a73a3b9372c12004211e004eea4269a8d3da9001c2301
    scripts:
      - excludepcsc.sh
      - setserverdefaultzone.sh
      - disable-coreos-migration-motd.sh
      - remove-dns-greenboot-check.sh
