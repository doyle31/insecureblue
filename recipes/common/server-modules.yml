modules:
  - type: dnf
    source: ghcr.io/blue-build/modules@sha256:bfc7637d823742eaabc7c01bbd3def9de1eeff28e9891916e501f54644ff1d7a
    install:
      install-weak-deps: false
      packages:
        - setools-console
        - usbguard
        - firewalld
        - policycoreutils-python-utils

  - type: files
    source: ghcr.io/blue-build/modules@sha256:bfc7637d823742eaabc7c01bbd3def9de1eeff28e9891916e501f54644ff1d7a
    files:
      - source: system/server
        destination: /

  - type: script
    source: ghcr.io/blue-build/modules@sha256:bfc7637d823742eaabc7c01bbd3def9de1eeff28e9891916e501f54644ff1d7a
    scripts:
      - excludepcsc.sh
      - setserverdefaultzone.sh
      - disable-coreos-migration-motd.sh
      - remove-dns-greenboot-check.sh
