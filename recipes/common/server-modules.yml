modules:
  - type: dnf
    source: ghcr.io/blue-build/modules@sha256:8e92fcaaef385a1728b8d8224296484260b67126ac83f7ed85b4ae3dde4ad19d
    install:
      install-weak-deps: false
      packages:
        - setools-console
        - usbguard
        - firewalld
        - policycoreutils-python-utils

  - type: files
    source: ghcr.io/blue-build/modules@sha256:8e92fcaaef385a1728b8d8224296484260b67126ac83f7ed85b4ae3dde4ad19d
    files:
      - source: system/server
        destination: /

  - type: script
    source: ghcr.io/blue-build/modules@sha256:8e92fcaaef385a1728b8d8224296484260b67126ac83f7ed85b4ae3dde4ad19d
    scripts:
      - excludepcsc.sh
      - setserverdefaultzone.sh
      - disable-coreos-migration-motd.sh
