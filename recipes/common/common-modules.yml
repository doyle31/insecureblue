modules:
    - type: script
      source: ghcr.io/blue-build/modules@sha256:23b9c9a2032ac653bf6a73a3b9372c12004211e004eea4269a8d3da9001c2301
      scripts:
        - addrepos.sh
        - createautostartdir.sh
        - httpsmirrors.sh
        - unprotectsudo.sh
        # comment/uncomment the line below to disable/enable kernel pinning
        # - installpinnedkernel.sh 
        # remove line below once rpm-ostree is fixed
        - pinrpmostree.sh
    - from-file: common/common-packages.yml
    - type: files
      source: ghcr.io/blue-build/modules@sha256:23b9c9a2032ac653bf6a73a3b9372c12004211e004eea4269a8d3da9001c2301
      files:
        - source: system/usr
          destination: /usr
        - source: system/etc
          destination: /etc
    - from-file: common/common-scripts.yml
    - type: justfiles
      source: ghcr.io/blue-build/modules@sha256:23b9c9a2032ac653bf6a73a3b9372c12004211e004eea4269a8d3da9001c2301
      validate: true
      include:
        - common
    - type: script
      source: ghcr.io/blue-build/modules@sha256:23b9c9a2032ac653bf6a73a3b9372c12004211e004eea4269a8d3da9001c2301
      scripts:
        - signkernel.sh
      secrets:
        - type: env
          name: KERNEL_PRIVKEY
          mount:
            type: file
            destination: /tmp/certs/private_key.priv
    - type: secureblue-signing
      source: local
